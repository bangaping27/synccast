version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: synccast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  synccast:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      APP_ENV: production
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/synccast?sslmode=disable"
      WS_READ_BUFFER_SIZE: "1024"
      WS_WRITE_BUFFER_SIZE: "1024"
      WS_MAX_MESSAGE_SIZE: "512"
      ROOM_TTL_SECONDS: "86400"
      JWT_SECRET: "replace-this-in-prod"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
